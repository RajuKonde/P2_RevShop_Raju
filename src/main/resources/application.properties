spring.application.name=revshop
spring.datasource.url=jdbc:oracle:thin:@localhost:1521/XEPDB1
spring.datasource.username=revshop
spring.datasource.password=revshop

spring.datasource.driver-class-name=oracle.jdbc.OracleDriver

spring.jpa.database-platform=org.hibernate.dialect.OracleDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

server.port=8080

app.upload.root-dir=uploads
app.upload.product-images-dir=uploads/product-images
app.upload.profile-images-dir=uploads/profile-images
app.upload.public-base-url=http://localhost:8080
app.security.jwt-secret=${JWT_SECRET:RevShopJwtSecretChangeThisToAtLeast32Chars}
app.security.jwt-expiration-ms=${JWT_EXPIRATION_MS:86400000}

spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=50MB

app.admin.api-key=${APP_ADMIN_API_KEY:change-me-admin-key}

springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.display-request-duration=true
springdoc.swagger-ui.operations-sorter=method
springdoc.swagger-ui.tags-sorter=alpha
